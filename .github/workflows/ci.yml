name: Backend CI

# Railway is configured with "Wait for CI" so it watches this workflow's status
# on pushes to main and auto-deploys staging when the test job succeeds.
# We do not call a Railway deploy hook from here.

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  test:
    name: Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw test

      - name: Build jar
        run: ./mvnw -DskipTests package

      - name: Build Docker image
        run: docker build -t sentimospadel-backend:ci .
