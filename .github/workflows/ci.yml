name: Backend CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  test:
    name: Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw test

      - name: Build jar
        run: ./mvnw -DskipTests package

      - name: Build Docker image
        run: docker build -t sentimospadel-backend:ci .

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging

    steps:
      - name: Trigger Railway staging deploy
        run: curl -fsSL -X POST "${{ secrets.RAILWAY_STAGING_DEPLOY_HOOK }}"
