spring:
  config:
    activate:
      on-profile: production
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  flyway:
    locations: classpath:db/migration

app:
  auth:
    email-verification:
      log-only: ${EMAIL_VERIFICATION_LOG_ONLY:false}
      verification-base-url: ${EMAIL_VERIFICATION_BASE_URL}
      login-url: ${EMAIL_VERIFICATION_LOGIN_URL}
      from-address: ${EMAIL_VERIFICATION_FROM}
  notifications:
    push:
      enabled: ${PUSH_NOTIFICATIONS_ENABLED:true}
      provider: ${PUSH_NOTIFICATIONS_PROVIDER:fcm}
      log-payloads: ${PUSH_NOTIFICATIONS_LOG_PAYLOADS:false}
      fcm-project-id: ${FCM_PROJECT_ID:}
      fcm-service-account-json-base64: ${FCM_SERVICE_ACCOUNT_JSON_BASE64:}
      fcm-access-token-uri: ${FCM_ACCESS_TOKEN_URI:https://oauth2.googleapis.com/token}
      fcm-endpoint: ${FCM_ENDPOINT:https://fcm.googleapis.com/v1/projects/%s/messages:send}
  match-invitations:
    base-url: ${MATCH_INVITATION_BASE_URL}
  tournament-invitations:
    base-url: ${TOURNAMENT_INVITATION_BASE_URL}
  media:
    player-profile-photos:
      storage-path: ${PLAYER_PROFILE_PHOTO_STORAGE_PATH}
      public-base-url: ${PLAYER_PROFILE_PHOTO_PUBLIC_BASE_URL}
  security:
    jwt:
      secret: ${JWT_SECRET}
