spring:
  application:
    name: backend
  servlet:
    multipart:
      max-file-size: ${PLAYER_PROFILE_PHOTO_MAX_FILE_SIZE:5MB}
      max-request-size: ${PLAYER_PROFILE_PHOTO_MAX_REQUEST_SIZE:5MB}
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/sentimospadel?currentSchema=public}
    username: ${DB_USERNAME:sentimospadel_user}
    password: ${DB_PASSWORD:sentimospadel_local_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: public
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/seed
    default-schema: public
    validate-on-migrate: true

server:
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  auth:
    rate-limit:
      enabled: ${AUTH_RATE_LIMIT_ENABLED:true}
      login:
        max-attempts: ${AUTH_RATE_LIMIT_LOGIN_MAX_ATTEMPTS:5}
        window: ${AUTH_RATE_LIMIT_LOGIN_WINDOW:10m}
      register:
        max-attempts: ${AUTH_RATE_LIMIT_REGISTER_MAX_ATTEMPTS:3}
        window: ${AUTH_RATE_LIMIT_REGISTER_WINDOW:1h}
      resend-verification:
        max-attempts: ${AUTH_RATE_LIMIT_RESEND_VERIFICATION_MAX_ATTEMPTS:3}
        window: ${AUTH_RATE_LIMIT_RESEND_VERIFICATION_WINDOW:15m}
    refresh-token:
      expiration: ${AUTH_REFRESH_TOKEN_EXPIRATION:30d}
    email-verification:
      log-only: ${EMAIL_VERIFICATION_LOG_ONLY:true}
      verification-base-url: ${EMAIL_VERIFICATION_BASE_URL:http://localhost:8080/api/auth/verify-email}
      from-address: ${EMAIL_VERIFICATION_FROM:no-reply@sentimospadel.test}
      login-url: ${EMAIL_VERIFICATION_LOGIN_URL:http://localhost:3000}
      expiration: ${EMAIL_VERIFICATION_EXPIRATION:24h}
      subject: ${EMAIL_VERIFICATION_SUBJECT:Confirma tu email en Sentimos Padel}
  notifications:
    push:
      enabled: ${PUSH_NOTIFICATIONS_ENABLED:true}
      log-payloads: ${PUSH_NOTIFICATIONS_LOG_PAYLOADS:true}
      provider: ${PUSH_NOTIFICATIONS_PROVIDER:log-only}
      fcm-project-id: ${FCM_PROJECT_ID:}
      fcm-service-account-json-base64: ${FCM_SERVICE_ACCOUNT_JSON_BASE64:}
      fcm-access-token-uri: ${FCM_ACCESS_TOKEN_URI:https://oauth2.googleapis.com/token}
      fcm-endpoint: ${FCM_ENDPOINT:https://fcm.googleapis.com/v1/projects/%s/messages:send}
  match-invitations:
    base-url: ${MATCH_INVITATION_BASE_URL:http://localhost:3000}
    expiration: ${MATCH_INVITATION_EXPIRATION:14d}
  tournament-invitations:
    base-url: ${TOURNAMENT_INVITATION_BASE_URL:http://localhost:3000}
    expiration: ${TOURNAMENT_INVITATION_EXPIRATION:14d}
  media:
    player-profile-photos:
      storage-path: ${PLAYER_PROFILE_PHOTO_STORAGE_PATH:./var/player-profile-photos}
      public-base-url: ${PLAYER_PROFILE_PHOTO_PUBLIC_BASE_URL:http://localhost:8081/api/player-profile-photos}
      max-size-bytes: ${PLAYER_PROFILE_PHOTO_MAX_SIZE_BYTES:5242880}
  security:
    jwt:
      secret: ${JWT_SECRET:change-this-local-jwt-secret-change-this-local-jwt-secret}
      expiration-ms: ${JWT_EXPIRATION_MS:3600000}
