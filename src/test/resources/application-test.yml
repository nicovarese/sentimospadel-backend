spring:
  datasource:
    url: jdbc:h2:mem:sentimospadel_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1;INIT=CREATE SCHEMA IF NOT EXISTS public\;SET SCHEMA public
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: public
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: public

app:
  media:
    player-profile-photos:
      storage-path: ./target/test-player-profile-photos
      public-base-url: http://localhost:8081/api/player-profile-photos
      max-size-bytes: 5242880
  tournament-invitations:
    base-url: http://localhost:3000
    expiration: 14d
  security:
    jwt:
      secret: test-jwt-secret-test-jwt-secret-test-jwt-secret
      expiration-ms: 3600000
