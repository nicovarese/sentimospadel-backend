spring:
  datasource:
    url: jdbc:h2:mem:sentimospadel_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1;INIT=CREATE SCHEMA IF NOT EXISTS public\;SET SCHEMA public
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: public
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: public

app:
  security:
    jwt:
      secret: test-jwt-secret-test-jwt-secret-test-jwt-secret
      expiration-ms: 3600000
